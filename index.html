<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Docs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-row">
        <div>
          <h1>Open Docs</h1>
          <p class="subtitle">A bot that helps you set up OpenClaw.</p>
        </div>
        <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="api-key-section">
      <label for="api-key">Anthropic API Key</label>
      <div class="key-input-row">
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
        <button id="save-key-btn">Save</button>
      </div>
      <p class="hint">Your key stays in your browser (localStorage). Never sent anywhere except the Anthropic API.</p>
    </div>

    <div id="chat-container" class="centered">
      <div id="messages"></div>

      <div id="input-area">
        <textarea id="user-input" placeholder="Ask about OpenClaw..." rows="1" autofocus></textarea>
        <button id="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="status-bar">
      <span id="index-status">Loading index...</span>
    </div>
  </div>

  <script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
