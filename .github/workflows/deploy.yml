name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p _site
          cp index.html style.css app.js docs-index.json docs-chunks.json _site/
          # Inject API keys into the built app.js (placeholders -> secrets).
          # Using a Python one-liner avoids sed escaping headaches with the keys.
          python3 -c "
          import os, pathlib
          p = pathlib.Path('_site/app.js')
          text = p.read_text()
          text = text.replace('__ANTHROPIC_API_KEY__', os.environ['ANTHROPIC_API_KEY'])
          text = text.replace('__GEMINI_API_KEY__', os.environ.get('GEMINI_API_KEY', ''))
          p.write_text(text)
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
